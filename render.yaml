services:
  - type: web
    name: memoria-ar-backend
    env: node
    # Install Chromium system dependencies needed by Puppeteer, then install npm packages.
    # Puppeteer v22 downloads its own bundled Chromium during `npm install`; the apt-get
    # packages below are the shared libraries that bundled Chromium requires at runtime on
    # Render's Ubuntu image. Without them, puppeteer.launch() throws "error while loading
    # shared libraries: libnss3.so: cannot open shared object file" on cold start.
    buildCommand: >
      apt-get update &&
      apt-get install -y --no-install-recommends
        ca-certificates fonts-liberation libappindicator3-1 libasound2 libatk-bridge2.0-0
        libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1
        libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0
        libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1
        libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1
        libxss1 libxtst6 lsb-release wget xdg-utils &&
      npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Tell Puppeteer where its bundled Chromium binary lives (set automatically
      # by the puppeteer package, but explicit here for clarity/debugging).
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      # Required — set these in the Render dashboard as secret env vars:
      # MONGODB_URI          — MongoDB Atlas connection string
      # CLOUDINARY_CLOUD_NAME — Cloudinary cloud name
      # CLOUDINARY_API_KEY    — Cloudinary API key
      # CLOUDINARY_API_SECRET — Cloudinary API secret
      # Optional:
      # FRONTEND_ORIGIN      — Override if using a custom domain (default: https://memoria-ar.pages.dev)
